events {
    worker_connections 1024;
}

http {
    upstream openclaw_backend {
        server 172.28.0.10:18789;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

        # Note: Authentication is handled by the backend service (Hermes/OpenClaw)
        # nginx Basic Auth is disabled to allow the SPA to manage its own session tokens

        # Pass to OpenClaw
        location / {
            proxy_pass http://openclaw_backend;

            proxy_set_header Origin http://localhost:18789;

            # WebSocket support (required for OpenClaw)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint (no auth required)
        location /health {
            auth_basic off;
            proxy_pass http://openclaw_backend/health;
        }
    }
}