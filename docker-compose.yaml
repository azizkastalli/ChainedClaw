services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.4.9
    container_name: openclaw
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    environment:
      - APP_HOME=/home/openclaw
      - HOME=/home/openclaw
      - OPENCLAW_GATEWAY_BIND=172.28.0.10
      - NPM_CONFIG_CACHE=/home/openclaw/.openclaw/npm-cache
    volumes:
      - type: bind
        source: ./.openclaw-data
        target: /home/openclaw/.openclaw
      - type: bind
        source: ./.ssh
        target: /home/openclaw/.ssh
      - type: bind
        source: ./.ssh
        target: /home/node/.ssh
      - ./config.json:/config.json:ro
      - ./scripts/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      openclaw-net:
        ipv4_address: 172.28.0.10
    restart: unless-stopped

  nginx:
    image: nginx:1.29.8
    container_name: openclaw-nginx
    ports:
      - "127.0.0.1:${NGINX_HTTP_PORT:-8090}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/etc/nginx/html:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      openclaw-net:
        ipv4_address: 172.28.0.20
    depends_on:
      - openclaw
    restart: unless-stopped

networks:
  openclaw-net:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1

volumes: {}

