services:

  # ── OpenClaw agent ────────────────────────────────────────────────────────────
  # Start with: make up AGENT=openclaw
  #
  # Security posture (openclaw is treated as LESS trusted than claudecode):
  #   - user: root            — needed to run iptables directly (cap_drop strips SETUID/SETGID, sudo unusable)
  #   - init-firewall.sh      — internal egress allowlist (same as claudecode)
  #   - FORWARD chain         — SSH egress restricted to config.json hosts only
  #   - cap_drop: ALL         — zero Linux capabilities by default
  #   - cap_add: NET_ADMIN/NET_RAW — needed for iptables in entrypoint (root phase only)
  #   - cap_add: SETUID/SETGID    — needed for gosu root→openclaw drop; cleared from effective set after exec
  #   - no-new-privileges         — inherited by agent after drop; prevents capability re-gain
  #   - seccomp profile           — blocks dangerous syscalls (mount, unshare, ptrace, bpf, etc.)
  #   - tmpfs /tmp /run ~/.ssh    — RAM-backed, wiped on restart; chowned to openclaw before drop
  #
  # Note: init-firewall.sh allowlist covers npm, GitHub, Anthropic API, Sentry,
  # Statsig. If openclaw needs additional endpoints (Telegram, custom APIs), add
  # them to agents/init-firewall.sh or extend via EXTRA_ALLOWED_DOMAINS (future).
  openclaw:
    profiles: [openclaw]
    build:
      context: ./agents
      dockerfile: openclaw/Dockerfile
    container_name: agent-dev
    user: root
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
      - seccomp:./security/seccomp-agent.json
    tmpfs:
      - /tmp
      - /run
      - /home/openclaw/.ssh
    environment:
      - APP_HOME=/home/openclaw
      - HOME=/home/openclaw
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - NPM_CONFIG_CACHE=/home/openclaw/.openclaw/npm-cache
      - AGENT_USER=openclaw
      - AGENT_CMD=openclaw gateway run --allow-unconfigured
    volumes:
      - type: bind
        source: ./.openclaw-data
        target: /home/openclaw/.openclaw
      - type: bind
        source: ./.ssh
        target: /home/openclaw/.ssh-keys
        read_only: true
      - ./config.json:/config.json:ro
      - ./scripts/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      agent-dev-net:
        ipv4_address: 172.28.0.10
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
    restart: unless-stopped

  # ── Claude Code agent ─────────────────────────────────────────────────────────
  # Start with: make up AGENT=claudecode
  #
  # Security posture (claudecode is more trusted — first-party Anthropic tool):
  #   - init-firewall.sh      — same internal egress allowlist as openclaw
  #   - FORWARD chain         — SSH egress restricted to config.json hosts only
  #   - user: root (entrypoint) → node (agent) — root for iptables, gosu drops to node before exec
  #   - cap_drop: ALL         — zero Linux capabilities by default
  #   - cap_add: NET_ADMIN/NET_RAW — needed for iptables in entrypoint (root phase only)
  #   - cap_add: SETUID/SETGID    — needed for gosu root→node drop; cleared from effective set after exec
  #   - no-new-privileges         — inherited by agent after drop; prevents capability re-gain
  #   - no read_only              — claude needs to write to its config and workspace dirs inside container
  #   - seccomp profile           — blocks dangerous syscalls (mount, unshare, ptrace, bpf, etc.)
  claudecode:
    profiles: [claudecode]
    build:
      context: ./agents
      dockerfile: claudecode/Dockerfile
    container_name: agent-dev
    user: root
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
      - seccomp:./security/seccomp-agent.json
    tmpfs:
      - /tmp
      - /run
      - /home/node/.ssh
    environment:
      - HOME=/home/node
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - NODE_OPTIONS=--max-old-space-size=4096
      - AGENT_USER=node
      - AGENT_CMD=claude --auto-approve
    volumes:
      - type: bind
        source: ./.claudecode-data
        target: /home/node/.claude
      - type: bind
        source: ./.ssh
        target: /home/node/.ssh-keys
        read_only: true
      - ./config.json:/config.json:ro
      - ./scripts/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      agent-dev-net:
        ipv4_address: 172.28.0.10
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4g
    restart: unless-stopped

  # ── Hermes Agent (NousResearch) ───────────────────────────────────────────────
  # Start with: make up AGENT=hermes
  #
  # Security posture (same hardening as claudecode):
  #   - user: root (entrypoint) → hermes UID 1000 (agent) via gosu
  #   - init-firewall.sh      — same internal egress allowlist; extend via config.json allowed_domains
  #   - FORWARD chain         — SSH egress restricted to config.json hosts only
  #   - cap_drop: ALL / cap_add: NET_ADMIN/NET_RAW/SETUID/SETGID/CHOWN
  #   - no-new-privileges, seccomp profile
  #   - no read_only          — hermes writes to its venv/cache at runtime (same tradeoff as claudecode)
  #
  # Set AGENT_CMD=hermes to launch the interactive CLI, or override for gateway mode.
  # Add extra API domains (OpenAI, Exa, Firecrawl, etc.) to config.json allowed_domains.
  hermes:
    profiles: [hermes]
    build:
      context: ./agents
      dockerfile: hermes/Dockerfile
    container_name: agent-dev
    user: root
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
      - seccomp:./security/seccomp-agent.json
    tmpfs:
      - /tmp
      - /run
      - /home/hermes/.ssh
    environment:
      - HOME=/home/hermes
      - HERMES_HOME=/opt/data
      - AGENT_USER=hermes
      - AGENT_CMD=/usr/local/bin/start-hermes.sh
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - type: bind
        source: ./.hermes-data
        target: /opt/data
      - type: bind
        source: ./.ssh
        target: /home/hermes/.ssh-keys
        read_only: true
      - ./config.json:/config.json:ro
      - ./agents/init-firewall.sh:/usr/local/bin/init-firewall.sh:ro
    entrypoint: ["/entrypoint.sh"]
    networks:
      agent-dev-net:
        ipv4_address: 172.28.0.10
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4g
    restart: unless-stopped

  # ── nginx dashboard ───────────────────────────────────────────────────────────
  # Started with AGENT=openclaw or AGENT=hermes (both expose a web gateway).
  # claudecode is CLI-only — no dashboard.
  nginx:
    profiles: [openclaw, hermes]
    image: nginx:1.29.8
    container_name: agent-dev-nginx
    ports:
      - "127.0.0.1:${NGINX_HTTP_PORT:-8090}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/etc/nginx/html:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      agent-dev-net:
        ipv4_address: 172.28.0.20
    restart: unless-stopped

networks:
  agent-dev-net:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1