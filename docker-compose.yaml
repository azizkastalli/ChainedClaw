services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    runtime: sysbox-runc        # Secure nested containers — DinD without privileged mode.
                                # Sysbox maps container root to an unprivileged host UID via
                                # Linux user namespaces. Inner containers cannot escape to the
                                # host kernel or host Docker daemon even if fully compromised.
                                # Prerequisite: install Sysbox on the host (see README).
    # user: "1000:1000"         # Removed: Sysbox manages UID remapping internally.
                                # Container root → unprivileged host UID (e.g. 165536).
    # read_only: true           # Removed: inner Docker daemon needs a writable /var/lib/docker.
                                # Docker writes are scoped to the openclaw-docker named volume.
    # cap_drop: ALL             # Removed: Sysbox requires standard caps for its user-namespace
                                # machinery. Security boundary is the Sysbox runtime, not cap_drop.
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    environment:
      - APP_HOME=/home/openclaw
      - HOME=/home/openclaw
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - NPM_CONFIG_CACHE=/home/openclaw/.openclaw/npm-cache
    volumes:
      - openclaw-docker:/var/lib/docker   # Inner Docker image/layer storage (isolated, named volume)
      - type: bind
        source: ./.openclaw-data
        target: /home/openclaw/.openclaw
      - type: bind
        source: ./.ssh
        target: /home/openclaw/.ssh
        read_only: true         # Agent uses keys, never writes them (prevents key tampering)
      - type: bind
        source: ./.ssh
        target: /home/node/.ssh
        read_only: true         # Same key dir mounted for node user — also read-only
      - ./config.json:/config.json:ro
      - ./scripts/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      openclaw-net:
        ipv4_address: 172.28.0.10
    deploy:
      resources:
        limits:
          cpus: '2.0'           # Prevent CPU exhaustion (crypto mining, inference loops)
          memory: 2g            # 2 GB covers agent + inner Docker daemon + browser container
    restart: unless-stopped

  nginx:
    image: nginx:1.29.8
    container_name: openclaw-nginx
    ports:
      - "127.0.0.1:${NGINX_HTTP_PORT:-8090}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/etc/nginx/html:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      openclaw-net:
        ipv4_address: 172.28.0.20
    depends_on:
      - openclaw
    restart: unless-stopped

networks:
  openclaw-net:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1

volumes:
  openclaw-docker: {}           # Persistent inner Docker image cache — survives container restarts
